services:
  - type: web
    name: intent-discovery-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: intent-discovery-db
          property: connectionString

databases:
  - name: intent-discovery-db
    plan: free
    databaseName: intent_discovery
    user: intent_discovery
